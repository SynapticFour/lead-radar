name: Lead Radar
on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:
    inputs:
      reset:
        description: 'Ignore dedup ledger and re-evaluate recently-seen items'
        type: boolean
        default: false
      reset_days:
        description: 'How many days back to un-mark as seen (0 = clear entire ledger, re-evaluate everything ever seen)'
        type: string
        default: '1'
permissions:
  contents: write
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - name: Run Lead Radar
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.reset }}" = "true" ]; then
            ARGS="--reset-days ${{ github.event.inputs.reset_days || '1' }}"
          fi
          python main.py $ARGS
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      - name: Commit digest
        run: |
          git config user.name "lead-radar-bot"
          git config user.email "bot@localhost"
          git add digests/ data/seen.db MANUAL_CHECKLIST.md
          git add -f raw/ 2>/dev/null || true
          git commit -m "Digest $(date +%F)$( [ '${{ github.event.inputs.reset }}' = 'true' ] && echo ' (reset run)' )" || echo "nothing to commit"
          git push
